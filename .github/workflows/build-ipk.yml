name: Build Shinra Packages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Assemble IPK and APK Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Provision Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gettext apk-tools
          wget https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build -O /usr/local/bin/ipkg-build
          chmod +x /usr/local/bin/ipkg-build

      - name: Execute Physical Assembly
        run: bash ./scripts/build.sh all

      - name: Upload Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-shinra-packages
          path: |
            *.ipk
            *.apk
          retention-days: 7
