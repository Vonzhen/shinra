name: Build Shinra Packages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Assemble IPK and APK Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Provision Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gettext
          wget https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build -O /usr/local/bin/ipkg-build
          chmod +x /usr/local/bin/ipkg-build

      - name: Build IPK Package
        run: bash ./scripts/build.sh ipk

      - name: Build APK Package
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            alpine:latest \
            sh -lc "apk add --no-cache bash apk-tools coreutils findutils sed grep && bash ./scripts/build.sh apk"

      - name: Upload Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-shinra-packages
          path: |
            *.ipk
            *.apk
          retention-days: 7
